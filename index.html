<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App de Materias</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-align: center;
            min-height: 100vh;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 400px;
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }
        input, button {
            padding: 10px;
            margin: 5px;
            border-radius: 10px;
            border: none;
            width: 80%;
        }
        button {
            background: black;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover {
            background: #333;
        }
        .card {
            background: white;
            color: black;
            padding: 15px;
            margin: 10px 0;
            border-radius: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 Mis Materias</h1>

    <div id="auth-section">
        <input id="email" placeholder="Email" type="email">
        <input id="password" type="password" placeholder="Contraseña">
        <br>
        <button onclick="registrar()">Registrarse</button>
        <button onclick="login()">Login</button>
    </div>

    <div id="app-section" style="display:none;">
        <input id="materia-input" placeholder="Nueva materia">
        <button onclick="agregarMateria()">Agregar</button>
        <div id="lista-materias"></div>
        <br>
        <button onclick="logout()" style="background: #ff4b2b;">Cerrar Sesión</button>
    </div>
</div>

<script type="module">
    // 1. IMPORTS DESDE CDN (Versión Modular)
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, query, where, onSnapshot, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getStorage, ref, uploadBytes } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";

    // 2. CONFIGURACIÓN (REEMPLAZA CON TUS DATOS REALES)
    const firebaseConfig = {
      // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
import { getAnalytics } from "firebase/analytics";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
// For Firebase JS SDK v7.20.0 and later, measurementId is optional
const firebaseConfig = {
  apiKey: "AIzaSyAVpZANJ7PNN6ZYrWDJKaLq6rDiMFoHb7o",
  authDomain: "mis-materias-22dd2.firebaseapp.com",
  projectId: "mis-materias-22dd2",
  storageBucket: "mis-materias-22dd2.firebasestorage.app",
  messagingSenderId: "869539444966",
  appId: "1:869539444966:web:0b880c13cf47774715a327",
  measurementId: "G-YMWFLQM27Y"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);
const analytics = getAnalytics(app);
    };

    // 3. INICIALIZAR SERVICIOS
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // --- FUNCIONES GLOBALES (Para que los botones de HTML las vean) ---

    // REGISTRO
    window.registrar = function() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        createUserWithEmailAndPassword(auth, email, password)
            .then(() => alert("¡Usuario creado con éxito!"))
            .catch(e => alert("Error: " + e.message));
    }

    // LOGIN
    window.login = function() {
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        signInWithEmailAndPassword(auth, email, password)
            .catch(e => alert("Error: " + e.message));
    }

    // LOGOUT
    window.logout = () => signOut(auth);

    // AGREGAR MATERIA
    window.agregarMateria = async function() {
        const nombre = document.getElementById("materia-input").value;
        if(!nombre) return alert("Escribe un nombre");

        try {
            await addDoc(collection(db, "materias"), {
                nombre: nombre,
                user: auth.currentUser.uid,
                fecha: new Date()
            });
            document.getElementById("materia-input").value = "";
        } catch (e) {
            alert("Error al guardar: " + e.message);
        }
    }

    // ELIMINAR MATERIA
    window.eliminarMateria = async function(id) {
        if(confirm("¿Eliminar esta materia?")) {
            await deleteDoc(doc(db, "materias", id));
        }
    }

    // SUBIR ARCHIVO
    window.subirArchivo = async function(e, id) {
        const archivo = e.target.files[0];
        if(!archivo) return;
        
        const storageRef = ref(storage, `archivos/${id}/${archivo.name}`);
        try {
            await uploadBytes(storageRef, archivo);
            alert("Archivo subido correctamente");
        } catch (e) {
            alert("Error al subir: " + e.message);
        }
    }

    // --- OBSERVADORES (Control de estado) ---

    // Vigilar si el usuario está logueado o no
    onAuthStateChanged(auth, (user) => {
        if (user) {
            document.getElementById("auth-section").style.display = "none";
            document.getElementById("app-section").style.display = "block";
            cargarMaterias(user.uid);
        } else {
            document.getElementById("auth-section").style.display = "block";
            document.getElementById("app-section").style.display = "none";
            document.getElementById("lista-materias").innerHTML = "";
        }
    });

    // Cargar materias en tiempo real
    function cargarMaterias(uid) {
        const q = query(collection(db, "materias"), where("user", "==", uid));
        
        onSnapshot(q, (snapshot) => {
            let html = "";
            snapshot.forEach(docSnap => {
                const m = docSnap.data();
                html += `
                <div class="card">
                    <h3>${m.nombre}</h3>
                    <input type="file" onchange="subirArchivo(event,'${docSnap.id}')" style="font-size: 10px; width: 90%;">
                    <br>
                    <button onclick="eliminarMateria('${docSnap.id}')" style="background:red; width: auto; margin-top:10px;">Eliminar</button>
                </div>
                `;
            });
            document.getElementById("lista-materias").innerHTML = html;
        });
    }

</script>

</body>
</html>
